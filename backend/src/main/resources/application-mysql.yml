spring:
  datasource:
    url: jdbc:mysql://YOUR_AZURE_DB_URL:3306/ecohabit_db?createDatabaseIfNotExist=true&useSSL=true&requireSSL=false&serverTimezone=UTC
    username: YOUR_USERNAME
    password: YOUR_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true